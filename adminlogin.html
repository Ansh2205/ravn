<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVN | Admin Authentication 🔐</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], },
                    colors: { ravn: { bg: '#FAFAF9', surface: '#FFFFFF', border: '#F3F4F6', primary: '#FF6B6B', primaryHover: '#FA5252', accent: '#FCA311', textMain: '#1C1917', textMuted: '#57534E', } },
                    animation: { 'float': 'float 8s ease-in-out infinite', 'float-delayed': 'float 8s ease-in-out 4s infinite', 'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both', },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0) scale(1)' }, '50%': { transform: 'translateY(-20px) scale(1.05)' }, }, shake: { '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } } }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #FAFAF9; color: #1C1917; overflow-x: hidden; }
        .glass-card { background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.7) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); }
        .friendly-input { background-color: #F9FAFB; border: 2px solid transparent; color: #1C1917; transition: all 0.3s ease; }
        .friendly-input:focus { background-color: #FFFFFF; border-color: #FF6B6B; box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1); outline: none; }
        .btn-glow { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); color: #ffffff; font-weight: 700; border-radius: 100px; padding: 16px 36px; transition: all 0.3s ease; box-shadow: 0 8px 25px -5px rgba(255, 107, 107, 0.4); display: inline-flex; align-items: center; justify-content: center; letter-spacing: 0.02em; font-size: 14px; cursor: pointer; border: none; min-height: 54px; }
        .btn-glow:hover { box-shadow: 0 12px 30px -5px rgba(255, 107, 107, 0.5); transform: translateY(-2px); }
        .btn-glow:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>

<body class="selection:bg-ravn-primary selection:text-white flex flex-col min-h-screen items-center justify-center relative">

    <!-- Ambient Background -->
    <div class="fixed inset-0 w-full h-full z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[10%] left-[10%] w-[400px] h-[400px] rounded-full bg-red-500/10 blur-[100px] animate-float"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[500px] h-[500px] rounded-full bg-orange-500/10 blur-[120px] animate-float-delayed"></div>
    </div>

    <div class="container mx-auto max-w-sm w-full px-6 relative z-10">
        
        <div class="glass-card p-10 text-center relative overflow-hidden bg-white/80">
            
            <div class="w-20 h-20 rounded-[24px] bg-red-50 flex items-center justify-center mx-auto mb-8 shadow-sm border border-red-100">
                <i class="ph-fill ph-lock-key text-4xl text-ravn-primary"></i>
            </div>
            
            <h2 class="text-3xl font-extrabold tracking-tight text-ravn-textMain mb-2">Command Node</h2>
            <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-8">Admin Verification</p>

            <div id="errorContainer" class="hidden mb-6 p-4 rounded-[16px] bg-red-50 border border-red-100 flex items-center justify-center gap-2 text-red-600 transition-opacity">
                <i class="ph-bold ph-warning-circle text-lg"></i>
                <p id="errorMessage" class="text-sm font-bold">Access Denied.</p>
            </div>

            <form id="adminLoginForm" class="space-y-6 text-left">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-ravn-textMain ml-1">Admin Email</label>
                    <input type="email" id="adminEmail" required placeholder="admin@ravn.io" 
                        class="friendly-input w-full px-5 py-4 rounded-[20px] font-medium text-sm shadow-sm text-center">
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-ravn-textMain ml-1">Passcode</label>
                    <input type="password" id="adminPassword" required placeholder="••••••••" 
                        class="friendly-input w-full px-5 py-4 rounded-[20px] font-medium text-center tracking-widest text-sm shadow-sm">
                </div>

                <button type="submit" id="loginBtn" class="btn-glow w-full py-4 text-sm mt-4">
                    Authenticate Session
                </button>
            </form>
            
            <a href="index.html" class="inline-block mt-8 text-xs font-bold text-gray-400 hover:text-ravn-primary transition-colors">
                Return to public site
            </a>
        </div>

    </div>

    <script>
        // Default Admin login is admin@ravn.io / admin123
        const form = document.getElementById('adminLoginForm');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorContainer.classList.remove('hidden');
            errorContainer.classList.add('flex', 'animate-shake');
            setTimeout(() => errorContainer.classList.remove('animate-shake'), 500);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorContainer.classList.add('hidden');
            errorContainer.classList.remove('flex');
            
            const btn = document.getElementById('loginBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i>';
            btn.disabled = true;

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) throw new Error("Invalid credentials");
                
                const data = await res.json();
                
                // Save the secure JWT token to the browser
                sessionStorage.setItem('ravn_admin_token', data.token);
                sessionStorage.setItem('ravn_admin_role', data.role);
                
                btn.innerHTML = '<i class="ph-bold ph-check-circle text-xl"></i> Verified';
                
                // Blast off to the command center!
                setTimeout(() => { window.location.href = 'admin.html'; }, 500);

            } catch (err) {
                showError(err.message);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
