<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVN | Clubhouse Scanner 📸</title>
    
    <!-- IMMEDIATE SECURITY CHECK: Ensure they have an admin token -->
    <script>
        const adminToken = sessionStorage.getItem('ravn_admin_token');
        if (!adminToken) {
            window.location.replace('adminlogin.html');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Use local or CDN HTML5 QR Code library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], },
                    colors: { ravn: { bg: '#FAFAF9', surface: '#FFFFFF', border: '#F3F4F6', primary: '#FF6B6B', primaryHover: '#FA5252', accent: '#FCA311', textMain: '#1C1917', textMuted: '#57534E', } },
                    animation: { 'float': 'float 8s ease-in-out infinite', 'float-delayed': 'float 8s ease-in-out 4s infinite', 'fade-in': 'fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards', 'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards' },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0) scale(1)' }, '50%': { transform: 'translateY(-20px) scale(1.05)' }, }, fadeIn: { from: { opacity: '0', transform: 'translateY(10px)' }, to: { opacity: '1', transform: 'translateY(0)' } }, slideUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #FAFAF9; color: #1C1917; overflow-x: hidden; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255, 255, 255, 0.8); }
        .glass-card { background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.8) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 32px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .btn-glow { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); color: #ffffff; font-weight: 700; border-radius: 100px; padding: 16px 36px; transition: all 0.3s ease; box-shadow: 0 8px 25px -5px rgba(255, 107, 107, 0.4); display: inline-flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: none; min-height: 54px; }
        .btn-glow:hover { box-shadow: 0 12px 30px -5px rgba(255, 107, 107, 0.5); transform: translateY(-2px); }
        .btn-glass { background: rgba(255, 255, 255, 0.9); color: #1C1917; font-weight: 700; border: 1px solid rgba(200, 200, 200, 0.4); border-radius: 100px; padding: 12px 24px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); display: inline-flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }
        .btn-glass:hover { background: #ffffff; border-color: rgba(255, 107, 107, 0.4); color: #FF6B6B; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05); }

        /* Force beautiful styling on the aggressively injected scanner elements */
        #reader { border: none !important; width: 100% !important; border-radius: 24px; overflow: hidden; background: #ffffff; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); }
        #reader__dashboard { padding: 1.5rem !important; }
        #reader video { object-fit: cover !important; border-radius: 24px !important; width: 100% !important; max-height: 400px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #reader__dashboard_section_csr span { color: #57534E !important; font-family: 'Plus Jakarta Sans', sans-serif !important; font-weight: 600; font-size: 13px !important; display: block; margin-bottom: 8px; }
        #reader button { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%) !important; color: #ffffff !important; border: none !important; padding: 14px 28px !important; border-radius: 100px !important; font-weight: 700 !important; font-family: 'Plus Jakarta Sans', sans-serif !important; font-size: 13px !important; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3) !important; transition: all 0.3s ease; display: inline-block; width: 100%; max-width: 250px; }
        #reader button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4) !important; }
        #reader select { padding: 14px; border-radius: 16px; border: 1px solid #E5E7EB; background: #F9FAFB; width: 100%; max-width: 280px; margin-bottom: 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 700; color: #1C1917; outline: none; appearance: none; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        #reader select:focus { border-color: #FF6B6B; background: #ffffff; box-shadow: 0 0 0 4px rgba(255,107,107,0.1); }
        #reader__scan_region { border-radius: 24px; overflow: hidden; background: #FAFAF9; margin-top: 1rem; padding: 10px; border: 1px dashed #E5E7EB; }
        /* Hide the library's default "powered by" and file-upload links */
        #reader a { display: none !important; }
    </style>
</head>

<body class="min-h-screen flex flex-col antialiased selection:bg-ravn-primary selection:text-white relative">

    <!-- Ambient Floating Background -->
    <div class="fixed inset-0 w-full h-full z-[-1] overflow-hidden pointer-events-none bg-ravn-bg">
        <div class="absolute top-[10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-ravn-primary/10 blur-[100px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-ravn-accent/15 blur-[120px] animate-float-delayed"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMDAwIiBmaWxsLW9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')] opacity-50"></div>
    </div>

    <!-- Scanner Navigation -->
    <nav class="h-[80px] glass-panel flex items-center justify-between px-6 md:px-8 shrink-0 z-50 shadow-sm sticky top-0 bg-white/70 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <img src="RAVN.png" alt="RAVN Logo" class="h-6 w-auto filter brightness-0 opacity-90" onerror="this.style.display='none';">
            <span class="font-extrabold text-xl tracking-wider text-ravn-textMain uppercase hidden sm:block">RAVN</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-green-50 px-4 py-2 rounded-full border border-green-200 shadow-sm">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-extrabold text-green-600 uppercase tracking-widest">Scanner Active</span>
            </div>
            <a href="admin.html" class="btn-glass !py-2 !px-4 text-[11px] gap-2">
                <i class="ph-bold ph-squares-four text-lg"></i> <span class="hidden sm:inline">Dashboard</span>
            </a>
        </div>
    </nav>

    <!-- Main Scanner Area -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 relative">
        <div class="w-full max-w-md flex flex-col gap-6 relative z-10 glass-card p-8 bg-white/80 animate-slide-up" id="scannerContainer">
            
            <div class="text-center mb-2">
                <h1 class="font-extrabold text-3xl md:text-4xl mb-1 tracking-tight text-ravn-textMain">Scan a Pass 🎟️</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Point the camera at their QR code.</p>
            </div>
            
            <!-- Scan Mode Toggles -->
            <div class="flex bg-white p-1.5 rounded-[20px] border border-gray-100 shadow-sm relative z-20">
                <button id="btnModeEntry" onclick="setScanMode('ENTRY')" class="flex-1 py-3 rounded-[16px] bg-ravn-primary text-white text-[11px] font-extrabold uppercase tracking-widest transition-colors shadow-sm">Door Entry</button>
                <button id="btnModeLunch" onclick="setScanMode('LUNCH')" class="flex-1 py-3 rounded-[16px] text-gray-400 bg-transparent text-[11px] font-extrabold uppercase tracking-widest transition-colors hover:bg-gray-50">Lunch / Perks</button>
            </div>

            <!-- The Camera Window -->
            <div class="bg-white p-3 rounded-[32px] shadow-sm border border-gray-100 w-full relative z-20">
                <div id="reader" class="w-full bg-gray-50 rounded-[24px]">
                    <!-- HTML5 QrCode lib injects here -->
                </div>
            </div>
            <p class="text-center text-[10px] uppercase font-extrabold tracking-widest text-ravn-primary animate-pulse" id="scanStatus">Awaiting Signal...</p>
        </div>

        <!-- Pop-up Result Overlay -->
        <div id="resultOverlay" class="fixed inset-0 z-[110] bg-gray-900/60 backdrop-blur-md hidden flex-col items-center justify-center p-4 transition-opacity duration-300 opacity-0">
            <div class="glass-card p-8 md:p-10 w-full max-w-sm text-center transform scale-95 transition-transform duration-300 bg-white/95 relative overflow-hidden" id="resultCard">
                
                <div id="resultTopStrip" class="absolute top-0 left-0 right-0 h-2 bg-green-400"></div>
                <div id="resultIconWrapper" class="w-24 h-24 rounded-[32px] flex items-center justify-center mx-auto mb-6 mt-4 shadow-sm"><i id="resultIcon" class="ph-fill text-5xl"></i></div>
                
                <span id="passTypeBadge" class="inline-block px-4 py-1.5 rounded-full border text-[10px] font-extrabold uppercase tracking-widest mb-4"></span>
                <h2 id="resultTitle" class="font-extrabold text-3xl mb-2 tracking-tight text-ravn-textMain">Status</h2>
                <p id="resultDesc" class="text-sm text-ravn-textMuted font-medium mb-8 leading-relaxed">Details</p>

                <!-- Profile Data (Injected dynamically) -->
                <div id="memberIdentityBlock" class="hidden bg-gray-50 p-4 rounded-[24px] border border-gray-100 mb-8 items-center gap-4 text-left shadow-inner">
                    <img id="resProfilePic" src="" class="w-14 h-14 rounded-[20px] object-cover bg-white border border-gray-200 shadow-sm shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 id="resName" class="font-extrabold text-sm text-ravn-textMain truncate">Name</h4>
                        <p id="resId" class="text-[10px] text-ravn-primary font-mono tracking-widest mt-1 font-bold bg-white px-2 py-0.5 rounded-md border border-gray-100 w-fit truncate max-w-full">ID</p>
                    </div>
                </div>

                <button onclick="resumeScanning()" class="btn-glow w-full py-4 text-sm gap-2"><span>Scan Next Pass</span> <i class="ph-bold ph-arrow-right text-lg"></i></button>
            </div>
        </div>
    </main>

    <script>
        let currentScanMode = 'ENTRY';
        let html5QrcodeScanner;

        function setScanMode(mode) {
            currentScanMode = mode;
            const btnEntry = document.getElementById('btnModeEntry'); 
            const btnLunch = document.getElementById('btnModeLunch');
            
            if(mode === 'ENTRY') {
                btnEntry.className = "flex-1 py-3 rounded-[16px] bg-ravn-primary text-white text-[11px] font-extrabold uppercase tracking-widest transition-colors shadow-sm";
                btnLunch.className = "flex-1 py-3 rounded-[16px] text-gray-400 bg-transparent text-[11px] font-extrabold uppercase tracking-widest transition-colors hover:bg-gray-50";
                document.getElementById('scanStatus').className = "text-center text-[10px] uppercase font-extrabold tracking-widest text-ravn-primary animate-pulse";
            } else {
                btnLunch.className = "flex-1 py-3 rounded-[16px] bg-orange-500 text-white text-[11px] font-extrabold uppercase tracking-widest transition-colors shadow-sm";
                btnEntry.className = "flex-1 py-3 rounded-[16px] text-gray-400 bg-transparent text-[11px] font-extrabold uppercase tracking-widest transition-colors hover:bg-gray-50";
                document.getElementById('scanStatus').className = "text-center text-[10px] uppercase font-extrabold tracking-widest text-orange-500 animate-pulse";
            }
        }

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 30, // SUPERCHARGE: Boosted from 10 to 30 frames per second
                    qrbox: { width: 250, height: 250 }, 
                    aspectRatio: 1.0,
                    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ], // LASER FOCUS: Ignore barcodes, only scan QR
                    supportedScanTypes: [ Html5QrcodeScanType.SCAN_TYPE_CAMERA ] // CLEAN UI: Hide the "upload image" button
                }, 
                false
            );
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        async function onScanSuccess(decodedText) {
            // Pause the scanner to prevent double-scanning the same ticket rapidly
            html5QrcodeScanner.pause(true);
            document.getElementById('scanStatus').textContent = "Checking the database... 🔍";
            
            try {
                const res = await fetch('/api/admin/scan', {
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${adminToken}` // Securely inject JWT token
                    },
                    body: JSON.stringify({ qrData: decodedText, scanType: currentScanMode })
                });
                
                const data = await res.json();
                
                // Security Check: If token is expired, boot them out
                if(res.status === 401 || res.status === 403) {
                    sessionStorage.removeItem('ravn_admin_token');
                    window.location.replace('adminlogin.html');
                    return;
                }

                if (res.ok && data.success) { 
                    showResult('success', data.type, data.message, data.member); 
                } else { 
                    throw new Error(data.error || "That didn't work. 🤔"); 
                }
            } catch (err) {
                showResult('error', 'Hold up! 🛑', err.message);
            }
        }

        function showResult(type, title, desc, member = null) {
            const overlay = document.getElementById('resultOverlay'); 
            const card = document.getElementById('resultCard'); 
            const topStrip = document.getElementById('resultTopStrip'); 
            const iconWrapper = document.getElementById('resultIconWrapper'); 
            const icon = document.getElementById('resultIcon'); 
            const titleEl = document.getElementById('resultTitle'); 
            const descEl = document.getElementById('resultDesc'); 
            const badge = document.getElementById('passTypeBadge'); 
            const idBlock = document.getElementById('memberIdentityBlock');

            titleEl.textContent = title === 'Membership Active' || title === 'Entry Permitted' ? 'Good to go! 🎉' : title; 
            descEl.textContent = desc;

            if (type === 'success') {
                topStrip.className = "absolute top-0 left-0 right-0 h-2 bg-green-400"; 
                iconWrapper.className = "w-24 h-24 rounded-[32px] flex items-center justify-center mx-auto mb-6 mt-4 bg-green-50 text-green-500 border border-green-100 shadow-sm"; 
                icon.className = "ph-fill ph-check-circle text-5xl";
                badge.textContent = "Access Granted"; 
                badge.className = "inline-block px-4 py-1.5 rounded-full bg-green-50 text-green-600 text-[10px] font-extrabold uppercase tracking-widest mb-4 border border-green-200";

                if (member) { 
                    idBlock.classList.remove('hidden'); idBlock.classList.add('flex'); 
                    document.getElementById('resName').textContent = member.name || "Guest"; 
                    document.getElementById('resId').textContent = member.memberId || member.email; 
                    
                    // Fallback to DiceBear initials if no profile pic exists
                    document.getElementById('resProfilePic').src = member.profilePic || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(member.name || "User")}&backgroundColor=FF6B6B`;
                } else { 
                    idBlock.classList.add('hidden'); idBlock.classList.remove('flex'); 
                }
            } else {
                topStrip.className = "absolute top-0 left-0 right-0 h-2 bg-red-400"; 
                iconWrapper.className = "w-24 h-24 rounded-[32px] flex items-center justify-center mx-auto mb-6 mt-4 bg-red-50 text-red-500 border border-red-100 shadow-sm"; 
                icon.className = "ph-fill ph-warning-circle text-5xl";
                badge.textContent = "Access Denied"; 
                badge.className = "inline-block px-4 py-1.5 rounded-full bg-red-50 text-red-500 text-[10px] font-extrabold uppercase tracking-widest mb-4 border border-red-200"; 
                idBlock.classList.add('hidden'); idBlock.classList.remove('flex');
            }

            overlay.classList.remove('hidden'); overlay.classList.add('flex'); 
            void overlay.offsetWidth; // Trigger reflow
            overlay.classList.remove('opacity-0');
            card.classList.remove('scale-95'); card.classList.add('scale-100');
        }

        function resumeScanning() {
            const overlay = document.getElementById('resultOverlay'); 
            const card = document.getElementById('resultCard');
            
            overlay.classList.add('opacity-0');
            card.classList.remove('scale-100'); card.classList.add('scale-95');
            
            setTimeout(() => { 
                overlay.classList.add('hidden'); overlay.classList.remove('flex'); 
                document.getElementById('scanStatus').textContent = "Awaiting Signal..."; 
                html5QrcodeScanner.resume(); 
            }, 300);
        }

        // Initialize automatically when the page loads!
        window.addEventListener('load', initScanner);
    </script>
</body>
</html>
